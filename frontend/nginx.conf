server {
    listen 80;
    server_name scrum-warden.davisoares.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name scrum-warden.davisoares.com.br;

    ssl_certificate /etc/letsencrypt/live/scrum-warden.davisoares.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scrum-warden.davisoares.com.br/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
