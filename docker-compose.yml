services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: scrum-warden-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scrumwarden}
      POSTGRES_USER: ${POSTGRES_USER:-scrumwarden}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scrumwarden}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── nginx ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: scrum-warden-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Frontend static files (copied here by GH Actions)
      - /var/www/scrum-warden:/usr/share/nginx/html:ro
      # nginx config (copied to VM on first setup or via deploy)
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
