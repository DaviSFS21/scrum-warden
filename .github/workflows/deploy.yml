name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Build NestJS backend ──────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Prune dev dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Generate Prisma Client (with arm64 binary)
        working-directory: backend
        env:
          DATABASE_URL: postgresql://scrumwarden:scrumwarden@localhost:5432/scrumwarden
        run: npx prisma generate

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: |
            backend/dist/
            backend/node_modules/
            backend/prisma/
            backend/package.json
          include-hidden-files: true
          retention-days: 1

  # ── Job 2: Build React/Vite frontend ─────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── Job 3: Deploy to Oracle VM ───────────────────────────────────────────
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: deploy/backend

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: deploy/frontend

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Add VM to known hosts
        run: ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      # ── Copy backend build to VM ─────────────────────────────────────────
      - name: Copy backend to VM
        run: |
          rsync -az --delete \
            deploy/backend/ \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/scrum-warden/backend/

      # ── Copy frontend static files to VM ─────────────────────────────────
      - name: Copy frontend to VM
        run: |
          rsync -az --delete \
            deploy/frontend/ \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/var/www/scrum-warden/

      # ── Copy nginx config and infra compose ──────────────────────────────
      - name: Copy infra files to VM
        run: |
          rsync -az \
            docker-compose.yml \
            frontend/nginx.conf \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/scrum-warden/

      # ── Apply migrations and restart app on VM ───────────────────────────
      - name: Deploy on VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            set -e
            cd ~/scrum-warden

            # Write .env file from GitHub Secrets
            cat > .env << ENVEOF
          POSTGRES_DB=scrumwarden
          POSTGRES_USER=scrumwarden
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=7d
          PORT=3000
          CORS_ORIGIN=*
          ENVEOF

            # Copy .env to backend folder too
            cp .env backend/.env

            # Start / update postgres and nginx (never removes volumes)
            docker compose -f docker-compose.yml up -d

            # Run pending migrations
            cd backend
            npx prisma migrate deploy

            # Restart backend with PM2
            pm2 restart scrum-warden-backend \
              || pm2 start dist/main.js \
                   --name scrum-warden-backend \
                   --env production

            pm2 save
          EOF

      # ── Verify ───────────────────────────────────────────────────────────
      - name: Verify
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            "docker compose -f ~/scrum-warden/docker-compose.yml ps && pm2 show scrum-warden-backend"
